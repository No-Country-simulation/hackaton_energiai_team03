version: '3.8'

services:
  # O microsserviço de Data Science
  ml-service:
    build:
      context: ./dataset
      dockerfile: Dockerfile
    container_name: chillywatts-ml
    ports:
      - "0.0.0.0:5000:5000" # Exposto para a máquina virtual
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  # O backend em Spring Boot
  backend-service:
    build:
      context: ./chillywatts
      dockerfile: Dockerfile
    container_name: chillywatts-backend
    ports:
      - "8080:8080" # Porta pública que o frontend vai consumir
    depends_on:
      - ml-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # O backend vai consumir a IA usando o nome do serviço no formato DNS do Docker
      - ML_SERVICE_URL=http://ml-service:5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always